<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academic Planner | David Adeniyi Adeoye</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">David.dev</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="planner.html">Planner</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="page-hero">
    <h1>Academic <span style="background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Planner</span></h1>
    <p>Manage your tasks, assignments and study goals</p>
  </div>

  <section>
    <div class="container">
      <div class="planner-wrap">

        <!-- Stats -->
        <div class="planner-stats fade-up">
          <div class="p-stat">
            <span id="stat-total">0</span>
            <span>Total Tasks</span>
          </div>
          <div class="p-stat">
            <span id="stat-completed">0</span>
            <span>Completed</span>
          </div>
          <div class="p-stat">
            <span id="stat-pending">0</span>
            <span>Pending</span>
          </div>
        </div>

        <!-- Add Task -->
        <div class="fade-up">
          <div class="planner-input-row">
            <input
              type="text"
              id="task-input"
              class="planner-input"
              placeholder="Add a new task e.g. Read Chapter 3 of Network Security..."
            />
            <select id="task-priority" class="select-input">
              <option value="high">🔴 High</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="low">🟢 Low</option>
            </select>
            <button class="btn btn-primary" onclick="addTask()">Add Task</button>
          </div>

          <!-- Filters -->
          <div class="task-filters">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">Pending</button>
            <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
          </div>
        </div>

        <!-- Task List -->
        <div id="task-list" class="task-list"></div>

      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 David Adeniyi Adeoye </p>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/planner.js"></script>
</body>
</html>
